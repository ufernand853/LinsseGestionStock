# Temporary HTTP-only Nginx site for issuing the first Let's Encrypt certificate
# for stock.linsse.com. Use this before enabling the SSL site if the certificate
# files under /etc/letsencrypt/live/stock.linsse.com/ do not exist yet.

server {
    listen 80;
    server_name stock.linsse.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /health {
        proxy_pass http://127.0.0.1:3010/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        root /home/adminuser/LinsseGestionStock/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
