# Nginx site example for serving LinsseGestionStock at https://stock.linsse.com.
# Copy to /etc/nginx/sites-available/stock.linsse.com, enable it with a symlink,
# then issue/renew the certificate with certbot before reloading nginx.

server {
    listen 80;
    server_name stock.linsse.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name stock.linsse.com;

    ssl_certificate /etc/letsencrypt/live/stock.linsse.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stock.linsse.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;

    root /home/adminuser/LinsseGestionStock/frontend/dist;
    index index.html;

    location /health {
        proxy_pass http://127.0.0.1:3010/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
